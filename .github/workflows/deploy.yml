name: Deploy to EC2
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /var/www/app || exit
          # Clean directory and clone/sync files directly
          sudo rm -rf *
          sudo curl -O https://githubusercontent.com{{ github.repository }}/main/app.js
          sudo curl -O https://githubusercontent.com{{ github.repository }}/main/package.json
          sudo npm install --production
          sudo pm2 restart app || sudo pm2 start app.js --name "app"
